<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — AJ Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --crimson:      #7a0e1e;
            --crimson-dark: #5c0a16;
            --crimson-mid:  #9b1528;
            --blush:        #f0b8c0;
            --blush-light:  #fce8ec;
            --white:        #ffffff;
            --off-white:    #fdf6f7;
            --gray:         #8a7070;
            --border:       #e8d5d8;
            --red:          #c0392b;
            --green:        #27ae60;
            --font-serif:   'Cormorant Garamond', Georgia, serif;
            --font-sans:    'Montserrat', "Helvetica Neue", Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
        body { background: var(--off-white); color: var(--crimson-dark); -webkit-font-smoothing: antialiased; }

        /* ── Login overlay ── */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--crimson);
            display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        #loginOverlay.hidden { display: none; }
        .login-box { text-align: center; }
        .login-box .logo-img { height: 90px; width: auto; margin: 0 auto 28px; display: block; }
        .login-box input {
            display: block; width: 260px; padding: 12px 16px; margin: 0 auto 14px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(240,184,192,0.4);
            color: var(--white); font-size: 1rem; letter-spacing: 1px; outline: none; font-family: var(--font-sans);
        }
        .login-box input::placeholder { color: rgba(255,255,255,0.4); }
        .login-box input:focus { border-color: var(--blush); background: rgba(255,255,255,0.15); }
        .login-box button {
            width: 260px; padding: 12px; background: var(--blush); color: var(--crimson-dark);
            border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; font-size: 0.82rem; font-family: var(--font-sans); transition: background 0.2s;
        }
        .login-box button:hover { background: var(--white); }
        .login-box .err { color: var(--blush-light); font-size: 0.82rem; margin-top: 10px; min-height: 18px; opacity: 0.85; }

        /* ── App shell ── */
        #app { display: none; }
        #app.visible { display: block; }

        header {
            background: var(--crimson); color: var(--blush);
            padding: 12px 32px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--crimson-dark);
        }
        header .logo-img { height: 42px; width: auto; }
        header a { color: var(--blush); opacity: 0.7; font-size: 0.75rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        header a:hover { opacity: 1; }

        .shell { max-width: 1100px; margin: 0 auto; padding: 36px 24px; display: grid; grid-template-columns: 380px 1fr; gap: 40px; }
        @media (max-width: 840px) { .shell { grid-template-columns: 1fr; } }

        /* ── Form panel ── */
        .panel { background: var(--white); border: 1px solid var(--border); padding: 28px; }
        .panel h2 { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 14px; color: var(--crimson); }

        label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 18px; color: var(--gray); }
        label:first-of-type { margin-top: 0; }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border);
            font-size: 0.9rem; background: var(--off-white); outline: none;
            font-family: var(--font-sans); color: var(--crimson-dark);
        }
        input:focus, select:focus, textarea:focus { border-color: var(--crimson-mid); background: var(--white); }
        textarea { resize: vertical; min-height: 80px; }

        /* image uploader */
        .upload-zone {
            border: 2px dashed var(--border); padding: 24px; text-align: center;
            cursor: pointer; transition: border-color 0.2s; margin-top: 8px; background: var(--off-white);
        }
        .upload-zone:hover, .upload-zone.drag { border-color: var(--crimson-mid); }
        .upload-zone p { font-size: 0.78rem; color: var(--gray); pointer-events: none; }
        .upload-zone strong { font-size: 0.85rem; display: block; margin-bottom: 4px; color: var(--crimson); }
        #fileInput { display: none; }

        .preview-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .preview-thumb { position: relative; width: 72px; height: 72px; border: 1px solid var(--border); overflow: hidden; }
        .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .preview-thumb .rm {
            position: absolute; top: 2px; right: 2px;
            background: rgba(90,10,20,0.7); color: #fff; border: none; cursor: pointer;
            font-size: 0.7rem; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
        }
        .upload-progress { font-size: 0.75rem; color: var(--gray); margin-top: 8px; min-height: 18px; }

        .row-inline { display: flex; align-items: center; gap: 10px; margin-top: 18px; }
        .row-inline label { margin: 0; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--crimson); }

        /* buttons */
        .btn-primary {
            display: block; width: 100%; padding: 14px; margin-top: 24px;
            background: var(--crimson); color: var(--blush); border: none;
            font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 1.5px; cursor: pointer; transition: background 0.2s; font-family: var(--font-sans);
        }
        .btn-primary:hover { background: var(--crimson-dark); }
        .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-ghost {
            padding: 6px 14px; background: transparent; border: 1px solid var(--border);
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; transition: all 0.2s; font-family: var(--font-sans); color: var(--crimson-dark);
        }
        .btn-ghost:hover { border-color: var(--crimson-mid); color: var(--crimson); }
        .btn-danger { border-color: #e8b0b0; color: var(--red); }
        .btn-danger:hover { background: var(--red); color: var(--white); border-color: var(--red); }

        .form-msg { font-size: 0.8rem; margin-top: 12px; min-height: 18px; }
        .form-msg.ok  { color: var(--green); }
        .form-msg.err { color: var(--red); }

        /* ── Listings panel ── */
        .listings-panel h2 { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; color: var(--crimson); }
        .listings-panel .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .listings-panel .controls input { flex: 1; padding: 9px 12px; border: 1px solid var(--border); font-size: 0.88rem; min-width: 160px; background: var(--white); font-family: var(--font-sans); outline: none; }
        .listings-panel .controls input:focus { border-color: var(--crimson-mid); }

        .listing-item {
            background: var(--white); border: 1px solid var(--border);
            display: grid; grid-template-columns: 72px 1fr auto; gap: 14px;
            align-items: center; padding: 14px; margin-bottom: 10px;
        }
        .listing-item img { width: 72px; height: 72px; object-fit: cover; }
        .listing-item .info .title { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--crimson-dark); }
        .listing-item .info .sub { font-size: 0.75rem; color: var(--gray); margin-top: 3px; }
        .listing-item .info .sold-tag { display: inline-block; margin-top: 4px; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; background: var(--blush-light); color: var(--crimson-mid); }
        .listing-actions { display: flex; gap: 8px; flex-direction: column; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<!-- Login gate -->
<div id="loginOverlay">
    <div class="login-box">
        <img src="logo.png" alt="AJ Marketplace" class="logo-img">
        <input type="password" id="pwInput" placeholder="Admin password" autocomplete="current-password">
        <button onclick="checkLogin()">Enter</button>
        <p class="err" id="loginErr"></p>
    </div>
</div>

<!-- App (hidden until logged in) -->
<div id="app">
    <header>
        <img src="logo.png" alt="AJ Marketplace" class="logo-img">
        <a href="index.html" target="_blank">View storefront ↗</a>
    </header>

    <div class="shell">

        <!-- ── Left: Add / Edit form ── -->
        <div class="panel">
            <h2 id="formTitle">Add New Listing</h2>
            <input type="hidden" id="editId">

            <label>Title</label>
            <input type="text" id="fTitle" placeholder="e.g. Vintage Levi's Denim Jacket">

            <label>Price (RM)</label>
            <input type="number" id="fPrice" placeholder="120" min="0" step="1">

            <label>Category</label>
            <select id="fCategory">
                <option value="house">House Item</option>
                <option value="clothing">Clothing</option>
                <option value="cat">Cat Item</option>
                <option value="beauty">Beauty</option>
                <option value="fragrance">Fragrance</option>
                <option value="others">Others</option>
            </select>

            <label>Condition</label>
            <select id="fCondition">
                <option value="Brandnew">Brand New</option>
                <option value="Preloved">Preloved</option>
            </select>

            <label>Size <span style="font-weight:400;text-transform:none;font-size:0.85em">(optional)</span></label>
            <input type="text" id="fSize" placeholder="M / 32x30 / One Size">

            <label>Description</label>
            <textarea id="fDesc" placeholder="Condition notes, wear history…"></textarea>

            <label>Location</label>
            <input type="text" id="fLocation" value="Kuala Lumpur">

            <label>Images</label>
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                <strong>Click to upload photos</strong>
                <p>JPG, PNG, WEBP · up to 5 images · max 5 MB each</p>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*">
            <div class="preview-row" id="previewRow"></div>
            <p class="upload-progress" id="uploadProgress"></p>

            <div class="row-inline">
                <input type="checkbox" id="fSold">
                <label for="fSold">Mark as Sold</label>
            </div>

            <button class="btn-primary" id="submitBtn" onclick="submitListing()">Add Listing</button>
            <button class="btn-ghost" id="cancelBtn" style="display:none;margin-top:8px;width:100%;" onclick="resetForm()">Cancel Edit</button>
            <p class="form-msg" id="formMsg"></p>
        </div>

        <!-- ── Right: Listings ── -->
        <div class="listings-panel">
            <h2>Your Listings</h2>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search listings…" oninput="filterListings()">
            </div>
            <div id="listingsContainer"><p class="empty-state">Loading…</p></div>
        </div>

    </div>
</div>

<script src="config.js"></script>
<script>

// ── Config (read from config.js) ──────────────
var SUPABASE_URL      = window.SUPABASE_URL;
var SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
var ADMIN_PASSWORD    = window.ADMIN_PASSWORD;
var STORAGE_BUCKET    = window.STORAGE_BUCKET || 'product-images';

// ── Auth ──────────────────────────────────────
function checkLogin() {
    var pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        loadListings();
    } else {
        document.getElementById('loginErr').textContent = 'Incorrect password.';
    }
}
document.getElementById('pwInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') checkLogin(); });

// ── Supabase helpers ──────────────────────────
async function sbFetch(path, opts) {
    opts = opts || {};
    var r = await fetch(SUPABASE_URL + path, Object.assign({}, opts, {
        headers: Object.assign({
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
        }, opts.headers || {})
    }));
    return r;
}

async function uploadImage(file) {
    var ext  = file.name.split('.').pop();
    var name = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
    var r = await fetch(
        SUPABASE_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + name,
        {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                'Content-Type': file.type,
                'x-upsert': 'false'
            },
            body: file
        }
    );
    if (!r.ok) { var e = await r.json(); throw new Error(e.error || 'Upload failed'); }
    return SUPABASE_URL + '/storage/v1/object/public/' + STORAGE_BUCKET + '/' + name;
}

// ── Image preview / staging ───────────────────
var stagedFiles  = [];
var existingUrls = [];

document.getElementById('fileInput').addEventListener('change', function(e) {
    addFiles(Array.from(e.target.files));
    e.target.value = '';
});

var zone = document.getElementById('uploadZone');
zone.addEventListener('dragover',  function(e) { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function()  { zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('drag');
    addFiles(Array.from(e.dataTransfer.files).filter(function(f) { return f.type.startsWith('image/'); }));
});

function addFiles(files) {
    var remaining = 5 - stagedFiles.length - existingUrls.length;
    files.slice(0, remaining).forEach(function(f) {
        if (f.size > 5 * 1024 * 1024) { alert(f.name + ' is over 5 MB and was skipped.'); return; }
        stagedFiles.push(f);
    });
    renderPreviews();
}

function renderPreviews() {
    var row = document.getElementById('previewRow');
    row.innerHTML = '';

    existingUrls.forEach(function(url, i) {
        var div = document.createElement('div');
        div.className = 'preview-thumb';
        div.innerHTML = '<img src="' + url + '"><button class="rm" title="Remove" onclick="removeExisting(' + i + ')">✕</button>';
        row.appendChild(div);
    });

    stagedFiles.forEach(function(file, i) {
        var div = document.createElement('div');
        div.className = 'preview-thumb';
        var img = document.createElement('img');
        var reader = new FileReader();
        reader.onload = function(e) { img.src = e.target.result; };
        reader.readAsDataURL(file);
        var btn = document.createElement('button');
        btn.className = 'rm'; btn.title = 'Remove'; btn.textContent = '✕';
        btn.onclick = (function(idx) {
            return function() { stagedFiles.splice(idx, 1); renderPreviews(); };
        })(i);
        div.appendChild(img); div.appendChild(btn);
        row.appendChild(div);
    });
}

function removeExisting(i) { existingUrls.splice(i, 1); renderPreviews(); }

// ── Submit ────────────────────────────────────
async function submitListing() {
    var btn    = document.getElementById('submitBtn');
    var msg    = document.getElementById('formMsg');
    var editId = document.getElementById('editId').value;

    var title     = document.getElementById('fTitle').value.trim();
    var price     = parseFloat(document.getElementById('fPrice').value);
    var category  = document.getElementById('fCategory').value;
    var condition = document.getElementById('fCondition').value;
    var size      = document.getElementById('fSize').value.trim();
    var desc      = document.getElementById('fDesc').value.trim();
    var location  = document.getElementById('fLocation').value.trim();
    var sold      = document.getElementById('fSold').checked;

    if (!title || isNaN(price)) { msg.textContent = 'Title and price are required.'; msg.className = 'form-msg err'; return; }

    btn.disabled = true; msg.textContent = '';

    try {
        var uploadedUrls = [];
        if (stagedFiles.length > 0) {
            document.getElementById('uploadProgress').textContent = 'Uploading ' + stagedFiles.length + ' image(s)…';
            for (var i = 0; i < stagedFiles.length; i++) {
                var url = await uploadImage(stagedFiles[i]);
                uploadedUrls.push(url);
                document.getElementById('uploadProgress').textContent = 'Uploaded ' + (i + 1) + ' / ' + stagedFiles.length;
            }
        }
        document.getElementById('uploadProgress').textContent = '';

        var allImages = existingUrls.concat(uploadedUrls);
        var payload   = { title: title, price: price, category: category, condition: condition, size: size, description: desc, location: location, sold: sold, images: JSON.stringify(allImages) };

        var r;
        if (editId) {
            r = await sbFetch('/rest/v1/products?id=eq.' + editId, {
                method: 'PATCH', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify(payload)
            });
        } else {
            r = await sbFetch('/rest/v1/products', {
                method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify(payload)
            });
        }

        if (!r.ok) { var err2 = await r.json(); throw new Error(err2.message || JSON.stringify(err2)); }

        msg.textContent = editId ? 'Listing updated!' : 'Listing added!';
        msg.className   = 'form-msg ok';
        resetForm();
        loadListings();

    } catch (err) {
        console.error(err);
        msg.textContent = 'Error: ' + err.message;
        msg.className   = 'form-msg err';
    }

    btn.disabled = false;
}

// ── Load + render listings ────────────────────
var allListings = [];

async function loadListings() {
    var container = document.getElementById('listingsContainer');
    try {
        var r = await sbFetch('/rest/v1/products?select=*&order=created_at.desc');
        allListings = await r.json();
        renderListings(allListings);
    } catch (err) {
        container.innerHTML = '<p class="empty-state" style="color:#c0392b">Failed to load: ' + err.message + '</p>';
    }
}

function filterListings() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    renderListings(allListings.filter(function(p) { return p.title.toLowerCase().includes(q); }));
}

function renderListings(products) {
    var container = document.getElementById('listingsContainer');
    if (!products.length) { container.innerHTML = '<p class="empty-state">No listings yet. Add one!</p>'; return; }
    container.innerHTML = products.map(function(p) {
        var images    = Array.isArray(p.images) ? p.images : JSON.parse(p.images || '[]');
        var thumb     = images[0] || 'https://placehold.co/72x72/fce8ec/9b1528?text=?';
        var soldBadge = p.sold ? '<span class="sold-tag">Sold</span>' : '';
        return '<div class="listing-item">' +
            '<img src="' + thumb + '" alt="' + p.title + '">' +
            '<div class="info">' +
                '<div class="title">' + p.title + '</div>' +
                '<div class="sub">RM ' + p.price + ' · ' + p.category + ' · ' + p.condition + (p.size ? ' · ' + p.size : '') + '</div>' +
                soldBadge +
            '</div>' +
            '<div class="listing-actions">' +
                '<button class="btn-ghost" onclick="editListing(' + p.id + ')">Edit</button>' +
                '<button class="btn-ghost btn-danger" onclick="deleteListing(' + p.id + ', \'' + p.title.replace(/'/g, "\\'") + '\')">Delete</button>' +
            '</div>' +
        '</div>';
    }).join('');
}

// ── Edit ──────────────────────────────────────
function editListing(id) {
    var p = allListings.find(function(x) { return x.id === id; });
    if (!p) return;
    document.getElementById('formTitle').textContent    = 'Edit Listing';
    document.getElementById('editId').value             = p.id;
    document.getElementById('fTitle').value             = p.title;
    document.getElementById('fPrice').value             = p.price;
    document.getElementById('fCategory').value          = p.category;
    document.getElementById('fCondition').value         = p.condition;
    document.getElementById('fSize').value              = p.size || '';
    document.getElementById('fDesc').value              = p.description || '';
    document.getElementById('fLocation').value          = p.location || '';
    document.getElementById('fSold').checked            = !!p.sold;
    document.getElementById('submitBtn').textContent    = 'Save Changes';
    document.getElementById('cancelBtn').style.display = 'block';
    document.getElementById('formMsg').textContent      = '';
    stagedFiles  = [];
    existingUrls = Array.isArray(p.images) ? p.images.slice() : JSON.parse(p.images || '[]');
    renderPreviews();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
    document.getElementById('formTitle').textContent    = 'Add New Listing';
    document.getElementById('editId').value             = '';
    document.getElementById('fTitle').value             = '';
    document.getElementById('fPrice').value             = '';
    document.getElementById('fCategory').value          = 'tops';
    document.getElementById('fCondition').value         = 'Excellent';
    document.getElementById('fSize').value              = '';
    document.getElementById('fDesc').value              = '';
    document.getElementById('fLocation').value          = 'Kuala Lumpur';
    document.getElementById('fSold').checked            = false;
    document.getElementById('submitBtn').textContent    = 'Add Listing';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('formMsg').textContent      = '';
    document.getElementById('uploadProgress').textContent = '';
    stagedFiles  = [];
    existingUrls = [];
    renderPreviews();
}

// ── Delete ────────────────────────────────────
async function deleteListing(id, title) {
    if (!confirm('Delete "' + title + '"? This cannot be undone.')) return;
    try {
        var r = await sbFetch('/rest/v1/products?id=eq.' + id, { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
        if (!r.ok) throw new Error('Delete failed');
        loadListings();
    } catch (err) {
        alert('Error deleting: ' + err.message);
    }
}

</script>
</body>
</html>
