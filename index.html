<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ's Preloved Item</title>
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --gray: #666666;
            --light-border: #e0e0e0;
            --dot-color: rgba(255,255,255,0.5);
            --dot-active-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--white); color: var(--black); line-height: 1.5; -webkit-font-smoothing: antialiased; }

        /* ── Header ── */
        header { background: var(--black); color: var(--white); padding: 20px 5%; text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        header p { font-size: 0.75rem; letter-spacing: 1.5px; color: #aaa; margin-top: 4px; text-transform: uppercase; }

        /* ── Layout ── */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* ── Filters ── */
        .filters { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn {
            background: transparent; border: 1px solid var(--black); color: var(--black);
            padding: 8px 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--black); color: var(--white); }

        /* ── Grid ── */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px 20px; }

        /* ── Card ── */
        .card { display: flex; flex-direction: column; opacity: 0; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ── Carousel ── */
        .carousel-outer {
            position: relative; width: 100%; margin-bottom: 16px;
            cursor: pointer; background: #f2f2f2; aspect-ratio: 1 / 1; overflow: hidden;
        }
        .carousel-content { display: flex; transition: transform 0.3s ease; height: 100%; }
        .carousel-content img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover; }

        /* tap hint overlay */
        .carousel-outer::after {
            content: '→';
            position: absolute; bottom: 10px; right: 12px;
            font-size: 0.75rem; color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.35); padding: 2px 7px; border-radius: 20px;
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        .carousel-outer.multi-image::after { opacity: 1; }

        .carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dot-color); transition: background 0.2s; }
        .dot.active { background: var(--dot-active-color); }

        /* ── Card info ── */
        .card-title { font-size: 1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .card-price { font-size: 1.1rem; font-weight: 400; margin-bottom: 10px; }
        .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .badge {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase; padding: 3px 9px; border: 1px solid #ddd; color: var(--gray);
        }
        .card-details { font-size: 0.88rem; color: var(--gray); margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-location { font-size: 0.78rem; color: #999; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── Buy Button ── */
        .btn {
            display: block; width: 100%; padding: 14px;
            background: var(--black); color: var(--white);
            text-align: center; text-decoration: none;
            font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            transition: background 0.2s, color 0.2s; margin-top: auto;
            border: 1px solid var(--black);
        }
        .btn:hover { background: transparent; color: var(--black); }
        .btn.sold { background: #ccc; border-color: #ccc; color: #888; pointer-events: none; }

        /* ── States ── */
        .state-msg { text-align: center; padding: 80px 20px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; font-size: 0.85rem; }
        .skeleton { background: #f2f2f2; border-radius: 0; }
        .skeleton-card { display: flex; flex-direction: column; gap: 10px; }
        .skeleton-img { aspect-ratio: 1/1; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
        .skeleton-line { height: 14px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
        .skeleton-line.short { width: 40%; }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* ── Footer ── */
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid var(--light-border); margin-top: 60px; }
        .social-link { display: inline-block; margin-bottom: 15px; color: var(--black); font-weight: 700; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--black); padding-bottom: 2px; }
        footer p { color: var(--gray); font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <h1>AJ's Preloved Item</h1>
    <p>Quality secondhand — Klang, Selangor</p>
</header>

<main class="container">

    <div class="filters" id="filterBar">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="tops">Tops</button>
        <button class="filter-btn" data-category="bottoms">Bottoms</button>
        <button class="filter-btn" data-category="accessories">Accessories</button>
    </div>

    <div class="grid" id="productGrid">
        <!-- skeleton placeholders while loading -->
        <div class="skeleton-card" id="sk1"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="skeleton-card" id="sk2"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="skeleton-card" id="sk3"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
    </div>

</main>

<footer>
    <a href="https://www.threads.net/@ajmegat" target="_blank" class="social-link">Follow on Threads @ajmegat</a>
    <p>&copy; 2026 AJ's Preloved Item. All items are sold as-is.</p>
</footer>

<!-- ─────────────────────────────────────────────
     CONFIG  — fill in your Supabase credentials
     (or set them via config.js)
──────────────────────────────────────────────── -->
<script src="config.js"></script>

<script>
// ── Supabase thin client (no SDK needed) ──────────────────────────
const sb = {
    url: window.SUPABASE_URL,
    key: window.SUPABASE_ANON_KEY,
    async query(table, params = '') {
        const r = await fetch(`${this.url}/rest/v1/${table}?${params}`, {
            headers: {
                'apikey': this.key,
                'Authorization': `Bearer ${this.key}`,
                'Content-Type': 'application/json'
            }
        });
        if (!r.ok) throw new Error(`Supabase error ${r.status}`);
        return r.json();
    }
};

// ── State ──────────────────────────────────────
let allProducts = [];
let activeCategory = 'all';

// ── Fetch products ──────────────────────────────
async function loadProducts() {
    try {
        const data = await sb.query('products', 'select=*&order=created_at.desc');
        allProducts = data;
        renderGrid(allProducts);
    } catch (err) {
        console.error(err);
        document.getElementById('productGrid').innerHTML =
            '<p class="state-msg" style="grid-column:1/-1">Failed to load listings. Please try again later.</p>';
    }
}

// ── Render ──────────────────────────────────────
function renderGrid(products) {
    const grid = document.getElementById('productGrid');

    const filtered = activeCategory === 'all'
        ? products
        : products.filter(p => p.category === activeCategory);

    if (filtered.length === 0) {
        grid.innerHTML = '<p class="state-msg" style="grid-column:1/-1">No items in this category yet.</p>';
        return;
    }

    grid.innerHTML = filtered.map(p => buildCard(p)).join('');
    initCarousels();
}

function buildCard(p) {
    // images is stored as a JSON array of URLs in Supabase
    const images = Array.isArray(p.images) ? p.images : JSON.parse(p.images || '[]');
    const waText = encodeURIComponent(`Hi! I'm interested in buying the ${p.title} (RM ${p.price}).`);
    const waLink = `https://wa.me/601161692804?text=${waText}`;

    const imgTags = images.length
        ? images.map((src, i) => `<img src="${src}" alt="${p.title} photo ${i+1}" loading="lazy">`).join('')
        : `<img src="https://placehold.co/600x600/f2f2f2/999?text=No+Image" alt="No image">`;

    const dots = images.length > 1
        ? `<div class="carousel-dots">${images.map((_,i) => `<span class="dot${i===0?' active':''}"></span>`).join('')}</div>`
        : '';

    const multiClass = images.length > 1 ? ' multi-image' : '';

    const conditionLabel = p.condition ? `<span class="badge">${p.condition}</span>` : '';
    const sizeLabel      = p.size      ? `<span class="badge">Size ${p.size}</span>` : '';

    const btnHtml = p.sold
        ? `<span class="btn sold">Sold</span>`
        : `<a href="${waLink}" target="_blank" rel="noopener" class="btn">Purchase via WhatsApp</a>`;

    return `
    <div class="card">
        <div class="carousel-outer${multiClass}" data-current-index="0">
            <div class="carousel-content">${imgTags}</div>
            ${dots}
        </div>
        <h3 class="card-title">${p.title}</h3>
        <div class="card-price">RM ${p.price}</div>
        <div class="card-meta">${conditionLabel}${sizeLabel}</div>
        <p class="card-details">${p.description || ''}</p>
        <div class="card-location">${p.location || ''}</div>
        ${btnHtml}
    </div>`;
}

// ── Carousel ───────────────────────────────────
function initCarousels() {
    document.querySelectorAll('.carousel-outer').forEach(outer => {
        const content  = outer.querySelector('.carousel-content');
        const images   = content.querySelectorAll('img');
        const dots     = outer.querySelectorAll('.dot');
        if (images.length <= 1) return;

        outer.addEventListener('click', () => {
            let cur  = parseInt(outer.dataset.currentIndex) || 0;
            let next = (cur + 1) % images.length;
            content.style.transform = `translateX(-${next * 100}%)`;
            dots[cur].classList.remove('active');
            dots[next].classList.add('active');
            outer.dataset.currentIndex = next;
        });
    });
}

// ── Filters ────────────────────────────────────
document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.category;
    renderGrid(allProducts);
});

// ── Init ───────────────────────────────────────
loadProducts();
</script>

</body>
</html>
